name: UtilityTools
version: 1.0.0
main: com.utilitytoolsplugin.UtilityToolsPlugin
api-version: '1.21'
description: "Plugin tự viết với TreeCapitator, OreVeinMiner và Hammer 3x3"
author: UtilityTools
website: ""

commands:
  hammer:
    description: "Quản lý Hammer 3x3"
    usage: "/<command> [give|info] [player] [material]"
    permission: utilitytoolsplugin.hammer
    permission-message: "§cBạn không có quyền dùng lệnh này!"
  shop:
    description: "Mở cửa hàng"
    usage: "/shop"
  sell:
    description: "Mở menu bán đồ"
    usage: "/sell"
  minimap:
    description: "Bật/tắt bản đồ mini góc trái (off-hand)"
    usage: "/minimap"
  rtp:
    description: "Teleport ngẫu nhiên đến Overworld hoặc Địa Ngục"
    usage: "/rtp"
  sethome:
    description: "Đặt home tại vị trí hiện tại"
    usage: "/sethome <tên>"
  home:
    description: "Teleport về home đã đặt"
    usage: "/home <tên>"
  delhome:
    description: "Xóa home"
    usage: "/delhome <tên>"
  stats:
    description: "Xem thống kê của người chơi"
    usage: "/stats [tên]"
  tpa:
    description: "Dịch chuyển đến người chơi khác"
    usage: "/tpa <tên>"
  pay:
    description: "Chuyển tiền cho người chơi khác"
    usage: "/pay <tên> <số_tiền>"
  raid:
    description: "Khởi động cuộc đột kích Boss"
    usage: "/raid [stop]"
    permission: utilitytoolsplugin.raid
    permission-message: "§cChỉ Admin mới có thể dùng lệnh này!"
  givemace:
    description: "Nhận Chùy Quỷ Dữ"
    usage: "/givemace"
    permission: utilitytoolsplugin.giveweapon
    permission-message: "§cBạn không có quyền dùng lệnh này!"
  givebow:
    description: "Nhận Cung Hủy Diệt"
    usage: "/givebow"
    permission: utilitytoolsplugin.giveweapon
    permission-message: "§cBạn không có quyền dùng lệnh này!"
  spawn:
    description: "Triệu hồi boss (ske, zombie hoặc spider)"
    usage: "/spawn <ske|zombie|spider>"
    permission: utilitytoolsplugin.spawnboss
    permission-message: "§cBạn không có quyền dùng lệnh này!"

permissions:
  utilitytoolsplugin.hammer:
    description: "Cho phép dùng lệnh /hammer"
    default: op
    
  utilitytoolsplugin.treecapitator:
    description: "Cho phép dùng TreeCapitator"
    default: true
    
  utilitytoolsplugin.veinminer:
    description: "Cho phép dùng OreVeinMiner"
    default: true
    
  utilitytoolsplugin.hammer.use:
    description: "Cho phép dùng Hammer 3x3"
    default: true

  utilitytoolsplugin.raid:
    description: "Cho phép khởi động Raid Boss"
    default: op

  utilitytoolsplugin.giveweapon:
    description: "Cho phép dùng lệnh lấy vũ khí boss"
    default: op

  utilitytoolsplugin.spawnboss:
    description: "Cho phép dùng lệnh /spawn để triệu hồi boss"
    default: op
